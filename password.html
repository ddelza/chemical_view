<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>비밀번호 확인</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
    background: #f0f4f8;
    color: #1a1a2e;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .box {
    background: white;
    border-radius: 16px;
    padding: 36px 32px;
    width: 100%;
    max-width: 360px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  }
  h1 {
    font-size: 1.2rem;
    font-weight: 700;
    margin-bottom: 6px;
    text-align: center;
  }
  .sub {
    font-size: 0.82rem;
    color: #888;
    text-align: center;
    margin-bottom: 24px;
  }
  .field { margin-bottom: 14px; }
  label {
    display: block;
    font-size: 0.82rem;
    font-weight: 600;
    color: #555;
    margin-bottom: 5px;
  }
  input {
    width: 100%;
    padding: 11px 12px;
    border: 1.5px solid #e0e0e0;
    border-radius: 8px;
    font-size: 0.95rem;
    background: #fafafa;
    outline: none;
  }
  input:focus { border-color: #1a1a2e; }
  #gBtnWrap {
    margin-top: 18px;
    display: flex;
    justify-content: center;
  }
  .msg { margin-top: 16px; font-size: 0.88rem; text-align: center; line-height: 1.6; }
  .msg.error { color: #e74c3c; }
  .msg.success {
    color: #1a1a2e;
    background: #eef6ff;
    border-radius: 10px;
    padding: 14px;
  }
  .pw-value {
    font-size: 1.4rem;
    font-weight: 800;
    letter-spacing: 2px;
    margin-top: 6px;
  }
</style>
</head>
<body>

<div class="box">
  <h1>🔑 비밀번호 확인</h1>
  <div class="sub">반·번호·이름 입력 후 구글 계정으로 확인해주세요</div>

  <div class="field">
    <label>반</label>
    <input type="text" id="inpBan" placeholder="예: 1" inputmode="numeric">
  </div>
  <div class="field">
    <label>번호</label>
    <input type="text" id="inpNum" placeholder="예: 5" inputmode="numeric">
  </div>
  <div class="field">
    <label>이름</label>
    <input type="text" id="inpName" placeholder="예: 김민준">
  </div>

  <div id="gBtnWrap"></div>
  <div class="msg" id="msgBox"></div>
</div>

<script>
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyEh1UNMp6SSSrli6LdpPRiwowY-4wXtKe4QYOt8kfM1fPdY8EB32I5UwHl00x7DcN6/exec';
  const GOOGLE_CLIENT_ID = '86143513697-lbfe2qpno6hgjc2l8t6bc6thuelscqpr.apps.googleusercontent.com';

  function handleCredentialResponse(response) {
    const ban  = document.getElementById('inpBan').value.trim();
    const num  = document.getElementById('inpNum').value.trim();
    const name = document.getElementById('inpName').value.trim();
    const msgBox = document.getElementById('msgBox');

    if (!ban || !num || !name) {
      msgBox.className = 'msg error';
      msgBox.textContent = '반, 번호, 이름을 먼저 입력해주세요.';
      return;
    }

    msgBox.className = 'msg';
    msgBox.textContent = '확인 중...';

    const url = new URL(APPS_SCRIPT_URL);
    url.searchParams.set('action', 'getPasswordHint');
    url.searchParams.set('idToken', response.credential);
    url.searchParams.set('ban', ban);
    url.searchParams.set('num', num);
    url.searchParams.set('name', name);

    fetch(url.toString())
      .then(r => r.json())
      .then(res => {
        if (res.ok) {
          msgBox.className = 'msg success';
          msgBox.innerHTML = '비밀번호는<div class="pw-value">' + res.password + '</div>입니다.';
        } else {
          msgBox.className = 'msg error';
          msgBox.textContent = res.reason || '확인할 수 없습니다.';
        }
      })
      .catch(err => {
        msgBox.className = 'msg error';
        msgBox.textContent = '오류가 발생했습니다: ' + err;
      });
  }

  window.onload = function () {
    google.accounts.id.initialize({
      client_id: GOOGLE_CLIENT_ID,
      callback: handleCredentialResponse
    });
    google.accounts.id.renderButton(
      document.getElementById('gBtnWrap'),
      { theme: 'outline', size: 'large', text: 'continue_with', shape: 'pill' }
    );
  };
</script>

</body>
</html>
